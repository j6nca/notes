name: Deploy Basalt

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  basalt_render:
    uses: gravityctl/basalt/.github/workflows/deploy.yml@main
    with:
      vault_repo: j6nca/notes
      vault_directory: docs
      output_directory: output
      site_name: Jon's Blog
      ignored_dirs: "templates,scripts,.obsidian,assets,diagrams,drafts"

